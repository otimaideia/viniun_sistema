<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5DC4DA;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#6B3AA3;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="white"/>
  <rect width="1200" height="400" fill="url(#bgGradient)"/>

  <!-- Title -->
  <text x="600" y="80" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#6B3AA3" text-anchor="middle">
    Chegamos em Praia Grande!
  </text>

  <!-- Main offer circle -->
  <circle cx="600" cy="200" r="90" fill="#6B3AA3"/>
  <text x="600" y="180" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="white" text-anchor="middle">10</text>
  <text x="600" y="210" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle">SESSÕES</text>
  <text x="600" y="235" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">DE DEPILAÇÃO A LASER EM ÁREA P*</text>

  <!-- GRATUITAS badge -->
  <rect x="500" y="310" width="200" height="60" rx="30" fill="#5DC4DA"/>
  <text x="600" y="350" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="white" text-anchor="middle">GRATUITAS</text>

  <!-- Subtitle -->
  <text x="600" y="390" font-family="Arial, sans-serif" font-size="14" fill="#6B3AA3" text-anchor="middle">
    Escaneie o QR Code e saiba mais!
  </text>
</svg>