  <!-- Registered trademark symbol -->
  <text x="820" y="75" font-family="Arial, sans-serif" font-size="24" fill="#6B3AA3">®</text>

  <!-- Subtitle -->
  <text x="210" y="165" font-family="Arial, sans-serif" font-size="20" letter-spacing="6" fill="#6B3AA3">DEPILAÇÃO A LASER E ESTÉTICA</text>
</svg>