          stroke="white"
          stroke-width="28"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>
  </g>

  <!-- YES text in purple - bold -->
  <text x="210" y="125" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#6B3AA3">YES</text>

  <!-- laser text in light blue -->
